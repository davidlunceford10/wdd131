<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Log a new workout or review your full workout history with FitTrack. Filter, search, and delete entries — all stored in your browser." />
    <meta name="author" content="David Lunceford" />
    <meta name="keywords" content="log workout, workout history, exercise log, fitness tracker, gym journal" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FitTrack — Log &amp; History" />
    <meta property="og:description" content="Record a new workout session or browse your full exercise history." />
    <meta property="og:image" content="images/website-logo.png" />
    <meta property="og:url" content="https://davidlunceford10.github.io/wdd131/fittrack/log.html" />
    <meta property="og:site_name" content="FitTrack" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FitTrack — Log &amp; History" />
    <meta name="twitter:description" content="Record a new workout or browse your exercise history." />

    <meta name="theme-color" content="#1A1A2E" />
    <meta name="color-scheme" content="dark" />

    <title>Log &amp; History — FitTrack</title>

    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header>
      <nav class="navbar" aria-label="Main navigation">
        <div class="container">
          <a class="nav-logo" href="index.html" aria-label="FitTrack Home">
            <img src="images/website-logo.png" alt="FitTrack logo" />
            <span>FitTrack</span>
          </a>
          <ul class="nav-links" role="list">
            <li><a href="index.html">Home</a></li>
            <li><a href="log.html" class="active" aria-current="page">Log Workout</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <div class="page-hero">
        <h1>Log &amp; History</h1>
        <p>Record a session or review everything you've done.</p>
      </div>

      <div class="log-page">
        <!-- TAB SWITCHER -->
        <div class="tabs" role="tablist" aria-label="Log or History view">
          <button class="tab-btn active" id="tab-log" role="tab" aria-selected="true" aria-controls="panel-log">
            ➕ Log Workout
          </button>
          <button class="tab-btn" id="tab-history" role="tab" aria-selected="false" aria-controls="panel-history">
            📋 History
          </button>
        </div>

        <!-- LOG FORM PANEL -->
        <div id="panel-log" role="tabpanel" aria-labelledby="tab-log">
          <div class="workout-form-card">
            <h2 class="section-title" style="text-align:left; margin-bottom:1.5rem;">New Workout</h2>

            <div id="form-toast" class="toast" role="alert" aria-live="polite">
              ✅ Workout saved successfully!
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label for="input-date">Date</label>
                <input type="date" id="input-date" name="date" required aria-required="true" />
              </div>

              <div class="form-group">
                <label for="input-exercise">Exercise</label>
                <input type="text" id="input-exercise" name="exercise" placeholder="e.g. Bench Press" required aria-required="true" />
              </div>

              <div class="form-group">
                <label for="input-sets">Sets</label>
                <input type="number" id="input-sets" name="sets" min="1" max="99" placeholder="4" required aria-required="true" />
              </div>

              <div class="form-group">
                <label for="input-reps">Reps</label>
                <input type="number" id="input-reps" name="reps" min="1" max="999" placeholder="8" required aria-required="true" />
              </div>

              <div class="form-group">
                <label for="input-weight">Weight (lbs)</label>
                <input type="number" id="input-weight" name="weight" min="0" step="2.5" placeholder="135" />
              </div>

              <div class="form-group full-width">
                <label for="input-notes">Notes (optional)</label>
                <textarea id="input-notes" name="notes" placeholder="e.g. Felt strong today, PR attempt next session…"></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn-primary" id="btn-save-workout" type="button">
                💾 Save Workout
              </button>
              <button class="btn btn-secondary" id="btn-clear-form" type="button">
                Clear
              </button>
            </div>
          </div>
        </div>

        <!-- HISTORY PANEL -->
        <div id="panel-history" role="tabpanel" aria-labelledby="tab-history" hidden>
          <div class="history-controls">
            <input
              type="search"
              id="filter-input"
              placeholder="🔍  Filter by exercise name…"
              aria-label="Filter workouts by exercise name"
            />
            <span class="history-count" id="history-count" aria-live="polite"></span>
          </div>

          <div class="history-list" id="history-list" role="list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>Built by <span>David Lunceford</span> · WDD 131 · BYU-Idaho 2025</p>
      <p style="margin-top:0.4rem;">All data stored locally in your browser, no account needed.</p>
    </footer>

    <script src="js/workouts.js"></script>
    <script src="js/log.js"></script>
  </body>
</html>
